<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUEST: VERIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #2a2a2a;
        --purple: #6a0dad;
        --yellow: #ffd700;
        --green: #00ff00;
      }

      body {
        background-color: var(--bg);
        font-family: 'Press Start 2P', cursive;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        image-rendering: pixelated;
      }

      .game-container {
        border: 4px solid white;
        padding: 4px;
        width: 100%;
        max-width: 600px;
        background: black;
        box-shadow: 10px 10px 0 rgba(0,0,0,0.5);
      }

      .screen {
        border: 4px solid var(--purple);
        padding: 20px;
        background: #110022;
        text-align: center;
      }

      h1 {
        color: var(--yellow);
        font-size: 20px;
        line-height: 1.5;
        margin-bottom: 40px;
        text-shadow: 4px 4px var(--purple);
      }

      .field {
        margin: 20px 0;
        text-align: left;
      }

      label {
        color: #00ffff;
        font-size: 12px;
        display: block;
        margin-bottom: 10px;
      }

      input {
        width: 100%;
        background: black;
        border: 4px solid white;
        color: var(--green);
        padding: 10px;
        font-family: inherit;
        font-size: 14px;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        background: #002200;
      }

      .quest-box {
        border: 4px solid var(--yellow);
        padding: 20px;
        margin: 30px 0;
        background: #221100;
      }

      .quest-title {
        color: var(--yellow);
        font-size: 10px;
        margin-bottom: 15px;
        text-transform: uppercase;
      }

      .health-bar {
        width: 100%;
        height: 20px;
        background: #550000;
        margin-bottom: 15px;
        border: 2px solid white;
        display: none;
      }

      .health-fill {
        height: 100%;
        width: 0%;
        background: #00ff00;
        transition: width 0.2s;
      }

      .action-btn {
        background: var(--purple);
        color: white;
        border: 4px solid white;
        padding: 15px 20px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
        display: inline-block;
        box-shadow: 0 6px #330066;
        position: relative;
        top: 0;
        transition: all 0.1s;
      }

      .action-btn:active {
        top: 6px;
        box-shadow: 0 0 #330066;
      }

      .action-btn:disabled {
        background: gray;
        box-shadow: 0 6px #333;
        cursor: not-allowed;
      }

      .status {
        font-size: 10px;
        margin-top: 10px;
        min-height: 20px;
        color: #aaa;
      }

      .main-btn {
        width: 100%;
        background: var(--green);
        color: black;
        border: 4px solid white;
        padding: 20px;
        font-family: inherit;
        font-size: 16px;
        cursor: pointer;
        margin-top: 20px;
      }

      .main-btn:disabled {
        background: #003300;
        color: #005500;
        cursor: not-allowed;
      }

    </style>
  </head>
  <body>
    <div class="game-container">
      <div class="screen">
        <h1>LOGIN QUEST</h1>

        <div class="field">
          <label>PLAYER NAME:</label>
          <input type="text" value="PLAYER_1">
        </div>

        <div class="quest-box">
          <div class="quest-title">! QUEST: PROVE HUMANITY !</div>
          <div class="health-bar" id="xp-bar">
            <div class="health-fill" id="xp-fill"></div>
          </div>
          <button class="action-btn" id="quest-btn">PRESS START</button>
          <div class="status" id="quest-status">READY...</div>
        </div>

        <button class="main-btn" id="enter-btn" disabled>ENTER WORLD</button>
      </div>
    </div>

    <script>
      const btn = document.getElementById('quest-btn');
      const bar = document.getElementById('xp-bar');
      const fill = document.getElementById('xp-fill');
      const status = document.getElementById('quest-status');
      const enter = document.getElementById('enter-btn');

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        bar.style.display = 'block';
        status.textContent = "CHARGING...";

        let progress = 0;
        while(progress < 100) {
          progress += Math.floor(Math.random() * 15) + 5;
          if(progress > 100) progress = 100;
          fill.style.width = progress + '%';
          status.textContent = `XP: ${progress}/100`;
          await new Promise(r => setTimeout(r, 200));
        }

        status.textContent = "LEVEL UP! HUMANITY VERIFIED";
        status.style.color = "var(--green)";
        btn.textContent = "COMPLETED";
        enter.disabled = false;
      });
    </script>
  </body>
</html>
