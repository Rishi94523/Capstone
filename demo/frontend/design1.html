<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoUW - CYBERPUNK_V1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
      :root {
        --neon-pink: #ff00ff;
        --neon-cyan: #00ffff;
        --bg-black: #050505;
        --grid-line: #1a1a1a;
        --text-main: #e0e0e0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-black);
        background-image: 
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 30px 30px;
        color: var(--text-main);
        font-family: 'Share Tech Mono', monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      .cyber-container {
        position: relative;
        width: 100%;
        max-width: 500px;
        padding: 2px;
        background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
        clip-path: polygon(
          10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%
        );
      }

      .cyber-inner {
        background: #0a0a0a;
        padding: 40px;
        clip-path: polygon(
          10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%
        );
      }

      h1 {
        text-transform: uppercase;
        color: var(--neon-cyan);
        text-shadow: 0 0 10px var(--neon-cyan);
        margin-top: 0;
        border-bottom: 2px solid var(--neon-pink);
        padding-bottom: 10px;
        letter-spacing: 2px;
      }

      .glitch-text {
        position: relative;
      }

      .glitch-text::before,
      .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      .glitch-text::before {
        left: 2px;
        text-shadow: -1px 0 #ff00c1;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
      }

      .glitch-text::after {
        left: -2px;
        text-shadow: -1px 0 #00fff9;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim2 5s infinite linear alternate-reverse;
      }

      @keyframes glitch-anim {
        0% { clip: rect(12px, 9999px, 46px, 0); }
        5% { clip: rect(82px, 9999px, 91px, 0); }
        10% { clip: rect(8px, 9999px, 15px, 0); }
        15% { clip: rect(93px, 9999px, 98px, 0); }
        100% { clip: rect(6px, 9999px, 66px, 0); }
      }

      @keyframes glitch-anim2 {
        0% { clip: rect(65px, 9999px, 93px, 0); }
        100% { clip: rect(2px, 9999px, 16px, 0); }
      }

      .input-group {
        margin-bottom: 20px;
        position: relative;
      }

      label {
        display: block;
        color: var(--neon-pink);
        margin-bottom: 5px;
        font-size: 0.8em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        background: transparent;
        border: 1px solid var(--text-main);
        color: var(--neon-cyan);
        padding: 10px;
        font-family: inherit;
        font-size: 1.1em;
        transition: all 0.3s;
      }

      input:focus {
        outline: none;
        border-color: var(--neon-cyan);
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      }

      .captcha-box {
        border: 2px dashed var(--neon-pink);
        padding: 20px;
        margin: 30px 0;
        text-align: center;
        position: relative;
      }

      .captcha-box::before {
        content: "SECURITY_PROTOCOL";
        position: absolute;
        top: -10px;
        left: 20px;
        background: #0a0a0a;
        padding: 0 10px;
        color: var(--neon-pink);
        font-size: 0.8em;
      }

      .verify-btn {
        background: transparent;
        border: 2px solid var(--neon-cyan);
        color: var(--neon-cyan);
        padding: 15px 40px;
        font-family: inherit;
        font-size: 1.2em;
        cursor: pointer;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
        transition: all 0.3s;
      }

      .verify-btn:hover {
        background: var(--neon-cyan);
        color: #000;
        box-shadow: 0 0 20px var(--neon-cyan);
      }

      .verify-btn:disabled {
        border-color: #555;
        color: #555;
        cursor: not-allowed;
        box-shadow: none;
      }

      .progress-bar {
        height: 4px;
        background: #333;
        margin-top: 15px;
        width: 100%;
        display: none;
      }

      .progress-fill {
        height: 100%;
        background: var(--neon-pink);
        width: 0%;
        box-shadow: 0 0 10px var(--neon-pink);
        transition: width 0.1s;
      }

      .status-text {
        margin-top: 10px;
        font-size: 0.9em;
        min-height: 1.2em;
      }

      .submit-btn {
        width: 100%;
        background: var(--neon-pink);
        color: #fff;
        border: none;
        padding: 15px;
        font-family: inherit;
        font-size: 1.2em;
        text-transform: uppercase;
        cursor: pointer;
        clip-path: polygon(0 0, 100% 0, 100% 80%, 95% 100%, 0 100%);
        transition: transform 0.2s;
      }

      .submit-btn:hover:not(:disabled) {
        transform: translate(-2px, -2px);
        filter: brightness(1.1);
      }

      .submit-btn:disabled {
        background: #333;
        color: #777;
        cursor: not-allowed;
      }

      .scan-line {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        animation: scan 3s linear infinite;
        pointer-events: none;
        z-index: 999;
      }

      @keyframes scan {
        0% { top: 0%; }
        100% { top: 100%; }
      }

    </style>
  </head>
  <body>
    <div class="scan-line"></div>
    <div class="cyber-container">
      <div class="cyber-inner">
        <h1 class="glitch-text" data-text="ACCESS_CONTROL">ACCESS_CONTROL</h1>
        
        <div class="input-group">
          <label>Identity_String</label>
          <input type="text" placeholder="USER.NAME" id="name">
        </div>

        <div class="input-group">
          <label>Comm_Link</label>
          <input type="email" placeholder="USER@NET.COM" id="email">
        </div>

        <div class="captcha-box">
          <button id="verify-btn" class="verify-btn">Initialise_Link</button>
          <div class="progress-bar" id="progress-container">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="status-text" id="status-text">WAITING FOR INPUT...</div>
        </div>

        <button id="submit-btn" class="submit-btn" disabled>GRANT_ACCESS</button>
      </div>
    </div>

    <script>
      const btn = document.getElementById('verify-btn');
      const progress = document.getElementById('progress-fill');
      const container = document.getElementById('progress-container');
      const status = document.getElementById('status-text');
      const submit = document.getElementById('submit-btn');

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.innerText = "PROCESSING...";
        container.style.display = 'block';
        
        // Simulation
        const steps = [
          { w: 20, t: "ESTABLISHING SECURE HANDSHAKE..." },
          { w: 45, t: "DOWNLOADING NEURAL SHARDS..." },
          { w: 70, t: "EXECUTING INFERENCE ROUTINES..." },
          { w: 90, t: "VERIFYING PROOF OF WORK..." },
          { w: 100, t: "ACCESS GRANTED" }
        ];

        for (const step of steps) {
          status.innerText = step.t;
          progress.style.width = step.w + '%';
          await new Promise(r => setTimeout(r, 600 + Math.random() * 400));
        }

        btn.style.borderColor = '#00ff00';
        btn.style.color = '#00ff00';
        btn.innerText = "VERIFIED";
        status.style.color = '#00ff00';
        submit.disabled = false;
      });
    </script>
  </body>
</html>
