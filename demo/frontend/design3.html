<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --navy: #0a2540;
        --gold: #cfb53b;
        --light-gray: #f0f4f8;
        --slate: #486581;
      }

      body {
        background-color: var(--light-gray);
        font-family: 'Open Sans', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      .enterprise-card {
        background: white;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        border-top: 5px solid var(--navy);
      }

      .header {
        background: var(--navy);
        padding: 30px;
        color: white;
      }

      .header h2 {
        font-family: 'Merriweather', serif;
        margin: 0;
        font-size: 24px;
      }

      .header p {
        margin: 10px 0 0;
        opacity: 0.8;
        font-size: 14px;
      }

      .content {
        padding: 40px;
      }

      .form-row {
        margin-bottom: 25px;
      }

      label {
        display: block;
        font-weight: 600;
        color: var(--navy);
        margin-bottom: 8px;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #cbd2d9;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 16px;
      }

      input:focus {
        border-color: var(--navy);
        outline: none;
      }

      .security-badge {
        background: #f0f4f8;
        border: 1px solid #dceefb;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .checkbox-wrapper {
        position: relative;
        width: 24px;
        height: 24px;
      }

      #security-check {
        width: 24px;
        height: 24px;
        margin: 0;
        cursor: pointer;
        opacity: 0;
        position: absolute;
        z-index: 2;
      }

      .fake-checkbox {
        position: absolute;
        top: 0;
        left: 0;
        width: 24px;
        height: 24px;
        border: 2px solid var(--slate);
        border-radius: 3px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .fake-checkbox::after {
        content: '✓';
        color: white;
        font-weight: bold;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.2s;
      }

      .fake-checkbox.checking {
        border-color: var(--gold);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      .fake-checkbox.checked {
        background: var(--navy);
        border-color: var(--navy);
      }

      .fake-checkbox.checked::after {
        opacity: 1;
        transform: scale(1);
      }

      @keyframes spin { 100% { transform: rotate(360deg); } }

      .security-text {
        font-size: 13px;
        color: var(--slate);
        line-height: 1.4;
      }

      .btn {
        background: var(--gold);
        color: var(--navy);
        width: 100%;
        padding: 15px;
        border: none;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn:hover {
        background: #deb835;
      }

      .btn:disabled {
        background: #e4e7eb;
        color: #9aa5b1;
        cursor: not-allowed;
      }

      .footer {
        padding: 20px 40px;
        background: #f8f9fa;
        border-top: 1px solid #e4e7eb;
        font-size: 12px;
        color: #8795a1;
        display: flex;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div class="enterprise-card">
      <div class="header">
        <h2>SecurePortal</h2>
        <p>Enterprise Access Verification</p>
      </div>
      <div class="content">
        <div class="form-row">
          <label>Employee ID</label>
          <input type="text" placeholder="ID-XXXXX">
        </div>
        <div class="form-row">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>

        <div class="security-badge">
          <div class="checkbox-wrapper">
            <input type="checkbox" id="security-check">
            <div class="fake-checkbox" id="fake-checkbox"></div>
          </div>
          <div class="security-text">
            <strong>Security Check Required</strong><br>
            Please verify you are an authorized human user.
          </div>
        </div>

        <button class="btn" id="login-btn" disabled>Authenticate</button>
      </div>
      <div class="footer">
        <span>© 2026 CorpSec Inc.</span>
        <span>SSL Encrypted</span>
      </div>
    </div>

    <script>
      const checkbox = document.getElementById('security-check');
      const fake = document.getElementById('fake-checkbox');
      const btn = document.getElementById('login-btn');

      checkbox.addEventListener('change', async function() {
        if (this.checked) {
          this.disabled = true; // prevent unchecking
          fake.className = 'fake-checkbox checking';
          
          // Simulate API call
          await new Promise(r => setTimeout(r, 2500));
          
          fake.className = 'fake-checkbox checked';
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
