<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eco Verify</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --sage: #8fbc8f;
        --earth: #8b4513;
        --cream: #fdfbf7;
        --leaf: #556b2f;
      }

      body {
        background-color: #e8f5e9;
        font-family: 'Nunito', sans-serif;
        color: #2c3e50;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .leaf-card {
        background: var(--cream);
        width: 100%;
        max-width: 420px;
        padding: 40px;
        border-radius: 30px 0 30px 0;
        box-shadow: 0 10px 20px rgba(85, 107, 47, 0.1);
        position: relative;
        overflow: hidden;
      }

      .leaf-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 8px;
        background: var(--sage);
      }

      h1 {
        color: var(--leaf);
        margin-top: 0;
      }

      .input-field {
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 15px;
        padding: 15px;
        margin-bottom: 20px;
        transition: border-color 0.3s;
      }

      .input-field:focus-within {
        border-color: var(--sage);
      }

      .input-field input {
        border: none;
        width: 100%;
        font-size: 16px;
        outline: none;
        color: #4a4a4a;
      }

      .eco-captcha {
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 20px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 30px;
      }

      .leaf-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: #f0f0f0;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        font-size: 20px;
      }

      .leaf-btn:hover {
        background: #e0e0e0;
      }

      .leaf-btn.growing {
        background: var(--sage);
        animation: grow 2s ease-in-out;
      }

      .leaf-btn.grown {
        background: var(--leaf);
        color: white;
      }

      @keyframes grow {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }

      .status {
        font-size: 14px;
        color: #777;
      }

      .submit-eco {
        width: 100%;
        background: var(--leaf);
        color: white;
        padding: 18px;
        border: none;
        border-radius: 15px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
      }

      .submit-eco:hover {
        background: #405222;
      }
      
      .submit-eco:disabled {
        background: #ccc;
        cursor: default;
      }

      .decoration {
        position: absolute;
        bottom: -20px;
        right: -20px;
        font-size: 150px;
        opacity: 0.05;
        color: var(--leaf);
        pointer-events: none;
      }

    </style>
  </head>
  <body>
    <div class="leaf-card">
      <div class="decoration">✿</div>
      <h1>Join Nature</h1>
      <p>Connect with the ecosystem.</p>
      
      <div class="input-field">
        <input type="email" placeholder="Email Address">
      </div>

      <div class="eco-captcha">
        <button class="leaf-btn" id="plant-btn">🌱</button>
        <div class="status" id="plant-status">Plant the seed to verify</div>
      </div>

      <button class="submit-eco" id="join-btn" disabled>Join Community</button>
    </div>

    <script>
      const btn = document.getElementById('plant-btn');
      const status = document.getElementById('plant-status');
      const join = document.getElementById('join-btn');

      btn.addEventListener('click', async () => {
        if (btn.classList.contains('grown')) return;

        btn.classList.add('growing');
        status.textContent = "Growing...";

        await new Promise(r => setTimeout(r, 2000));

        btn.classList.remove('growing');
        btn.classList.add('grown');
        btn.innerHTML = "🌳";
        status.textContent = "Verified Human";
        status.style.color = "var(--leaf)";
        join.disabled = false;
      });
    </script>
  </body>
</html>
